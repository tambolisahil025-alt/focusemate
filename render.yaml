services:
  - type: web
    name: focusemate-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SERVER_PROTOCOL
        value: https
      - key: SERVER_PORT
        value: 443
      - key: CORS_ORIGINS
        value: "*"
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
